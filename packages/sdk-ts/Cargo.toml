[workspace]

[package]
name = "tap-sdk"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
description = "napi-rs bindings for the Tap CDC engine"

[lib]
crate-type = ["cdylib"]

[dependencies]
tap-core = { path = "../../crates/tap-core" }
napi = { version = "2", features = ["default"] }
napi-derive = "2"

[build-dependencies]
napi-build = "2"
