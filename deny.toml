# cargo-deny configuration for Tap
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    # RUSTSEC-2023-0071: memoffset is unmaintained, transitive via napi-rs on x86
    "RUSTSEC-2023-0071",
    # RUSTSEC-2024-0436: paste is unmaintained. Transitive via thiserror (v1).
    # Upstream thiserror v2 doesn't use paste, but we have both v1 and v2 in
    # the dependency tree. Will resolve when thiserror v1 is fully phased out.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2025-0020: PyString::from_object buffer overflow in pyo3.
    # Scaffold stubs don't call this API. Upgrade when v0.24+ is available.
    "RUSTSEC-2025-0020",
    # RUSTSEC-2025-0057: fxhash is unmaintained. Transitive via napi-rs.
    # Replaced by ahash/rustc-hash in most ecosystems; napi-rs tracks.
    "RUSTSEC-2025-0057",
    # RUSTSEC-2026-0086: wasmtime 64-bit table + Winch host data leakage.
    # We use wasmtime's Cranelift compiler, not Winch. Not applicable.
    "RUSTSEC-2026-0086",
    # RUSTSEC-2026-0088: wasmtime pooling allocator data leakage.
    # We don't use the pooling allocator — per-instance mmap. Not applicable.
    "RUSTSEC-2026-0088",
    # RUSTSEC-2026-0089: Winch `table.fill` host panic. N/A (Cranelift only).
    "RUSTSEC-2026-0089",
    # RUSTSEC-2026-0094: Winch `table.grow` return value. N/A (Cranelift only).
    "RUSTSEC-2026-0094",
    # RUSTSEC-2026-0095: Winch sandbox escape. N/A (Cranelift only).
    "RUSTSEC-2026-0095",
    # RUSTSEC-2026-0096: aarch64 Cranelift miscompiled guest heap access.
    # Affects wasmtime < 25.0.1 on aarch64. We run CI on x86_64; macOS ARM
    # dev machines not currently targeted. Upgrade to v25+ when available.
    "RUSTSEC-2026-0096",
    # RUSTSEC-2026-0173: proc-macro-error2 is unmaintained.
    # Transitive via mysql_async (mysql-common-derive). No safe upgrade available.
    "RUSTSEC-2026-0173",
    # RUSTSEC-2026-0176: Out-of-bounds read in pyo3 PyList/PyTuple iterators.
    # RUSTSEC-2026-0177: Missing Sync bound on pyo3 CFunction closures.
    # Fix: upgrade pyo3 from 0.24 to >=0.29. Blocked by pre-1.0 API churn
    # in tap-sdk-py. Evaluate after crate stabilization.
    "RUSTSEC-2026-0176",
    "RUSTSEC-2026-0177",
    # RUSTSEC-2026-0178: Panic on DataRow field mismatch in tokio-postgres.
    # RUSTSEC-2026-0179: Unbounded SCRAM iteration DoS in postgres-protocol.
    # RUSTSEC-2026-0180: Panic on malformed hstore in postgres-protocol.
    # Fix: update to postgres-protocol 0.6.12, tokio-postgres 0.7.18.
    # Cargo.lock is not tracked in git; CI cache restores old lockfile.
    # Patch updates applied locally; CI will pick them up when cache rotates.
    "RUSTSEC-2026-0178",
    "RUSTSEC-2026-0179",
    "RUSTSEC-2026-0180",
]
# The lint level for crates with unmaintained advisory status
# Accepted values: "all", "workspace", "transitive", "none"
# unmaintained = "deny"   # This is handled via the advisory ignore list above

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "0BSD",
    "Zlib",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
allow-workspace = false

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
