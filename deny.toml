# cargo-deny configuration for Tap
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    # RUSTSEC-2023-0071: memoffset is unmaintained, transitive via napi-rs on x86
    "RUSTSEC-2023-0071",
    # RUSTSEC-2025-0020: PyString::from_object buffer overflow in pyo3.
    # Scaffold stubs don't call this API. Upgrade when v0.24+ is available.
    "RUSTSEC-2025-0020",
    # RUSTSEC-2026-0173: proc-macro-error2 is unmaintained.
    # Transitive via mysql_async (mysql-common-derive). No safe upgrade available.
    "RUSTSEC-2026-0173",
    # RUSTSEC-2026-0176: Out-of-bounds read in pyo3 PyList/PyTuple iterators.
    # RUSTSEC-2026-0177: Missing Sync bound on pyo3 CFunction closures.
    # Fix: upgrade pyo3 from 0.24 to >=0.29. Blocked by pre-1.0 API churn
    # in tap-sdk-py. Evaluate after crate stabilization.
    "RUSTSEC-2026-0176",
    "RUSTSEC-2026-0177",
]
# The lint level for crates with unmaintained advisory status
# Accepted values: "all", "workspace", "transitive", "none"
# unmaintained = "deny"   # This is handled via the advisory ignore list above

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "0BSD",
    "Zlib",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
allow-workspace = false

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
