# tap-cli moon task graph
# https://moonrepo.dev/docs/config/project

language: rust

tasks:
  build:
    command: cargo build -p tap-cli
    inputs:
      - "src/**/*"
      - "Cargo.toml"
    deps:
      - tap-core:build

  test:
    command: cargo test -p tap-cli
    deps:
      - build

  lint:
    command: cargo clippy -p tap-cli -- -D warnings

  fmt:
    command: cargo fmt -p tap-cli -- --check
