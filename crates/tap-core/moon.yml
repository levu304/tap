# tap-core moon task graph
# https://moonrepo.dev/docs/config/project

language: rust

tasks:
  build:
    command: cargo build -p tap-core
    inputs:
      - "src/**/*"
      - "Cargo.toml"

  test:
    command: cargo test -p tap-core
    deps:
      - build

  lint:
    command: cargo clippy -p tap-core -- -D warnings

  fmt:
    command: cargo fmt -p tap-core -- --check
