# Tap release pipeline
# Triggered by tags matching v* (e.g., v0.1.0).
#
# The matrix builds CLI binaries for 5 targets (3 runner types) and the
# napi-rs SDK binding for the runner's native platform.  Uploads all
# artifacts to a GitHub Release.
#
# Jobs:
#   release  — matrix: build CLI + SDK per (target, os)  (needs: nothing)
#   create-release — collect artifacts from all matrix jobs and publish
#
# Limitations (v0.1.0):
#   • napi-rs SDK is built only for the runner's native platform;
#     not every CLI target has a corresponding platform SDK build.
#   • macOS code signing is ad-hoc only; notarization is deferred.

name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

# =============================================================================
# Build matrix — one job per target-triple
# =============================================================================
jobs:
  release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # -- Apple Silicon ---------------------------------------------------
          - os: macos-14
            target: aarch64-apple-darwin
            binary-name: tap-darwin-arm64
            # napi-rs builds natively for the host arch
            sdk-platform: darwin-arm64

          # -- Apple Intel (cross-compiled from ARM runner) --------------------
          - os: macos-14
            target: x86_64-apple-darwin
            binary-name: tap-darwin-x64
            # no native napi build for x86_64 on an ARM runner
            sdk-platform: ""

          # -- Linux x86_64 (glibc) -------------------------------------------
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary-name: tap-linux-x64-gnu
            sdk-platform: linux-x64-gnu

          # -- Linux ARM64 (glibc, cross-compiled) -----------------------------
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            binary-name: tap-linux-arm64-gnu
            # cross-compiled platform — no native napi build
            sdk-platform: ""

          # -- Linux x86_64 (musl, fully static) -------------------------------
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            binary-name: tap-linux-x64-musl
            # cross-compiled platform — no native napi build
            sdk-platform: ""

      fail-fast: false

    steps:
      # -----------------------------------------------------------------------
      # Checkout & toolchain
      # -----------------------------------------------------------------------
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@9399c7bb15d4c7d47b27263d024f0a4978346ba4 # v1.11
        with:
          toolchain: "1.85.0"
          target: ${{ matrix.target }}

      -         uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # -----------------------------------------------------------------------
      # Build CLI binary
      # -----------------------------------------------------------------------
      - name: Install cross-compilation toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
      # -----------------------------------------------------------------------
      - name: Build CLI binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: |
          cargo build --release -p tap-cli --target ${{ matrix.target }}

      - name: Package CLI binary
        run: |
          mkdir -p dist
          # Copy binary and rename from "tap-cli" to "tap" so the dist
          # artifact name matches the user-facing command.
          cp "target/${{ matrix.target }}/release/tap-cli" "dist/${{ matrix.binary-name }}"
          # Create tarball
          tar -czf "dist/${{ matrix.binary-name }}.tar.gz" \
            -C dist "${{ matrix.binary-name }}"

      # -----------------------------------------------------------------------
      # macOS ad-hoc code signing (notarization deferred to v0.2+)
      # -----------------------------------------------------------------------
      - name: Sign binary (macOS ad-hoc)
        if: runner.os == 'macOS'
        run: |
          codesign --force -s - "dist/${{ matrix.binary-name }}" \
            && echo "  ✓ signed ${{ matrix.binary-name }} (ad-hoc)"

      # -----------------------------------------------------------------------
      # napi-rs SDK (native host platform only)
      # -----------------------------------------------------------------------
      - name: Setup pnpm
        if: ${{ matrix.sdk-platform != '' }}
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Setup Node
        if: ${{ matrix.sdk-platform != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: packages/sdk-ts/pnpm-lock.yaml

      - name: Install SDK dependencies
        if: ${{ matrix.sdk-platform != '' }}
        run: pnpm install --frozen-lockfile
        working-directory: packages/sdk-ts

      - name: Build napi-rs binding
        if: ${{ matrix.sdk-platform != '' }}
        run: npx @napi-rs/cli build --platform --release
        working-directory: packages/sdk-ts

      - name: Run napi artifacts
        if: ${{ matrix.sdk-platform != '' }}
        run: npx @napi-rs/cli artifacts
        working-directory: packages/sdk-ts

      - name: Package SDK platform artifacts
        if: ${{ matrix.sdk-platform != '' }}
        run: |
          mkdir -p dist
          tar -czf "dist/sdk-${{ matrix.sdk-platform }}.tar.gz" \
            -C npm "${{ matrix.sdk-platform }}"
        working-directory: packages/sdk-ts

      # -----------------------------------------------------------------------
      # Upload individual artifacts for the release collector job
      # -----------------------------------------------------------------------
      - name: Upload CLI binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.binary-name }}
          path: dist/${{ matrix.binary-name }}.tar.gz
          if-no-files-found: error

      - name: Upload SDK platform artifact
        if: ${{ matrix.sdk-platform != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdk-${{ matrix.sdk-platform }}
          path: packages/sdk-ts/dist/sdk-${{ matrix.sdk-platform }}.tar.gz
          if-no-files-found: error

      - name: Upload standalone binary (un-tarred, for direct download)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.binary-name }}-bin
          path: dist/${{ matrix.binary-name }}
          if-no-files-found: error

  # ===========================================================================
  # Collector job — create the GitHub Release with all assets
  # ===========================================================================
  create-release:
    name: Create GitHub Release
    needs: [release]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: false

      - name: Organise release assets
        run: |
          mkdir -p assets

          # Flatten: move every tar.gz and binary into a single assets/ dir
          find release-assets -type f \( -name '*.tar.gz' -o -name 'tap-*' \) \
            -exec cp {} assets/ \;

          # Generate checksums
          cd assets
          if command -v sha256sum &>/dev/null; then
            sha256sum * > SHA256SUMS
          else
            shasum -a 256 * > SHA256SUMS
          fi
          echo "Assets:"
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # The tag is already set from the push trigger.
          # Draft: true so a human can review before publishing.
          draft: true
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            assets/*

  # ===========================================================================
  # npm-publish — publish tap-cdc + platform bindings to npm
  #
  # Authenticates via npm Trusted Publishing (OIDC): no NPM_TOKEN secret.
  # The `id-token: write` permission above mints a short-lived JWT, and
  # `actions/setup-node` with `registry-url` configures npm to exchange
  # it for a registry session — so `npm publish` runs unauthenticated
  # in this workflow's env. The trusted publisher must be configured on
  # the tap-cdc package's npm settings (Provider: GitHub Actions,
  # Workflow: release.yml, Repo: levu304/tap).
  #
  # Idempotent: every publish step checks `npm view <pkg> version` and
  # skips the publish if the target version is already on the registry.
  # This makes the pipeline safe to re-run after a partial failure
  # (e.g. platforms published but the main republish failed with
  # EPUBLISHCONFLICT) and lets the downstream smoke-test job always run.
  # ===========================================================================
  npm-publish:
    name: Publish to npm
    needs: [create-release]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/sdk-ts

      - name: Download SDK platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/sdk-artifacts
          merge-multiple: false

      - name: Extract platform artifacts into npm/
        run: |
          find /tmp/sdk-artifacts -name 'sdk-*.tar.gz' \
            -exec tar -xzf {} -C npm/ \;
          echo "=== Platform packages ready ==="
          ls -la npm/*/package.json 2>/dev/null || echo "(no platform packages found)"
        working-directory: packages/sdk-ts

      - name: Publish platform packages
        run: |
          set -e
          for dir in npm/*/; do
            [ -f "${dir}package.json" ] || continue
            pkg=$(node -p "require('./${dir}package.json').name")
            ver=$(node -p "require('./${dir}package.json').version")
            on_npm=$(npm view "$pkg" version 2>/dev/null || echo "")
            if [ "$on_npm" = "$ver" ]; then
              echo "⏭  ${pkg}@${ver} already on npm, skipping"
            else
              echo "📤 Publishing ${pkg}@${ver}..."
              npm publish "${dir}" --access public
            fi
          done
        working-directory: packages/sdk-ts

      - name: Publish main tap-cdc package
        run: |
          ver=$(node -p "require('./package.json').version")
          on_npm=$(npm view tap-cdc version 2>/dev/null || echo "")
          if [ "$on_npm" = "$ver" ]; then
            echo "⏭  tap-cdc@${ver} already on npm, skipping"
          else
            echo "📤 Publishing tap-cdc@${ver}..."
            npm publish --access public
          fi
        working-directory: packages/sdk-ts

  # ===========================================================================
  # smoke-test — verify both distribution paths work after publish
  # ===========================================================================
  smoke-test:
    name: Smoke test distribution paths
    needs: [npm-publish]
    runs-on: ubuntu-24.04
    steps:
      - name: Test install.sh URL
        run: |
          HTTP_CODE=$(curl -fsSL -o /dev/null -w "%{http_code}" \
            "https://levu304.github.io/tap/install.sh")
          echo "install.sh → HTTP ${HTTP_CODE}"
          [ "$HTTP_CODE" = "200" ] || { echo "FAILED"; exit 1; }

      - name: Test npm package
        run: |
          PUBLISHED_VER=$(npm view tap-cdc version 2>/dev/null)
          echo "tap-cdc → v${PUBLISHED_VER}"
          [ -n "$PUBLISHED_VER" ] || { echo "FAILED — package not found"; exit 1; }
