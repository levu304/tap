# Deploy install.sh to GitHub Pages
#
# Publishes the canonical install script from scripts/install.sh to the
# gh-pages branch on every push to main.  The result is served at:
#
#   https://tap-dev.github.io/tap/install.sh
#
# Settings required (one-time):
#   1. Go to https://github.com/tap-dev/tap/settings/pages
#   2. Source → "Deploy from a branch"
#   3. Branch → "gh-pages" / "/ (root)"
#
# If you change the repo URL (tap-dev/tap → something else), update the
# README's install command and the install.sh URL in release.yml too.

name: Pages

on:
  push:
    branches: [main]
    paths:
      - scripts/install.sh

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy install.sh to GitHub Pages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare publish directory
        run: |
          mkdir -p _site
          cp scripts/install.sh _site/install.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          enable_jekyll: false
