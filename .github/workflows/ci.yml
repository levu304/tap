# Tap CI pipeline
# Runs on push to main and pull requests.
# Stages: fmt → lint → build (matrix) → test (pg matrix) + test-unit (matrix) + audit + e2e
#
# Jobs:
#   fmt       — cargo fmt --check
#   lint      — cargo clippy --workspace -- -D warnings       (needs fmt)
#   build     — cargo build --workspace                        (needs lint, matrix: os)
#   test      — cargo test --workspace with Postgres service   (needs build, matrix: pg-version)
#   test-unit — cargo test --lib --workspace + vitest          (needs build, matrix: os)
#   audit     — cargo deny check + cargo audit                 (needs fmt)
#   e2e       — scripts/e2e-test.sh with Postgres service      (needs build)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Formatting check
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Stage 2: Lint (clippy)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  # ---------------------------------------------------------------------------
  # Stage 3: Build (matrix: ubuntu, macos)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install protoc
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install protobuf
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
          fi
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        # Build with test profile so downstream test jobs reuse artifacts.
        # --lib compiles all lib tests; --test integration compiles the
        # integration test binary (including testcontainers) so PG test
        # jobs don't recompile from cold cache.
        run: |
          cargo test --no-run --workspace --lib
          cargo test --no-run -p tap-core --test integration

  # ---------------------------------------------------------------------------
  # Stage 4a: Integration tests (with Postgres, matrix: pg-version)
  # ---------------------------------------------------------------------------
  test:
    name: Test (pg ${{ matrix.pg-version }})
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 10
    strategy:
      matrix:
        pg-version: [14, 15, 16]
      fail-fast: false
    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}
        env:
          POSTGRES_PASSWORD: ${{ secrets.TAP_TEST_PG_PASSWORD || 'tap_test' }}
          POSTGRES_DB: tap_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - uses: Swatinem/rust-cache@v2

      - name: Configure Postgres for logical replication
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -c "ALTER SYSTEM SET wal_level = 'logical'"
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -c "ALTER SYSTEM SET max_replication_slots = '10'"
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -c "ALTER SYSTEM SET max_wal_senders = '10'"
          docker restart ${{ job.services.postgres.id }}
          sleep 3

      - name: Wait for Postgres after restart
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U postgres; then
              echo "Postgres ready"
              break
            fi
            sleep 1
          done

      - name: Verify Postgres is reachable
        env:
          PGPASSWORD: ${{ secrets.TAP_TEST_PG_PASSWORD || 'tap_test' }}
        run: |
          psql -h localhost -U postgres -d tap_test -c "SELECT version(), current_setting('wal_level') AS wal_level;"
          psql -h localhost -U postgres -d tap_test -c "SELECT 1 AS alive;"

      - name: Run lib tests
        env:
          TAP_TEST_DB: ${{ secrets.TAP_TEST_DB || 'postgres://postgres:tap_test@localhost:5432/tap_test' }}
          PGPASSWORD: ${{ secrets.TAP_TEST_PG_PASSWORD || 'tap_test' }}
        run: cargo test --lib --workspace -- --test-threads=1

      - name: Run integration tests
        env:
          TAP_TEST_DB: ${{ secrets.TAP_TEST_DB || 'postgres://postgres:tap_test@localhost:5432/tap_test' }}
          PGPASSWORD: ${{ secrets.TAP_TEST_PG_PASSWORD || 'tap_test' }}
          RUST_BACKTRACE: 1
        # Run in separate step so cargo doesn't run test binaries in parallel
        # Use --nocapture to ensure output is flushed immediately
        run: cargo test -p tap-core --test integration -- --test-threads=1 --nocapture

  # ---------------------------------------------------------------------------
  # Stage 4b: Unit tests (no Postgres needed, matrix: os)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install protoc
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install protobuf
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
          fi
      - uses: Swatinem/rust-cache@v2

      - name: Run library tests
        run: cargo test --lib --workspace

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: packages/sdk-ts/pnpm-lock.yaml

      - name: Install SDK dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: packages/sdk-ts

      - name: Build SDK native binding
        run: pnpm build
        working-directory: packages/sdk-ts

      - name: Run SDK tests
        run: pnpm exec vitest run
        working-directory: packages/sdk-ts

  # ---------------------------------------------------------------------------
  # Stage 5: Security audit
  # ---------------------------------------------------------------------------
  audit:
    name: Audit
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo-deny
        run: cargo deny check

      - name: Run cargo audit
        run: cargo audit

  # ---------------------------------------------------------------------------
  # Stage 6: End-to-end test
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ${{ secrets.TAP_TEST_PG_PASSWORD || 'tap_test' }}
          POSTGRES_DB: tap_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Configure Postgres for logical replication
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -c "ALTER SYSTEM SET wal_level = 'logical'"
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -c "ALTER SYSTEM SET max_replication_slots = '10'"
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -c "ALTER SYSTEM SET max_wal_senders = '10'"
          docker restart ${{ job.services.postgres.id }}
          sleep 3

      - name: Wait for Postgres after restart
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U postgres; then
              echo "Postgres ready"
              break
            fi
            sleep 1
          done

      - name: Run E2E test
        env:
          TAP_TEST_DB: ${{ secrets.TAP_TEST_DB || 'postgres://postgres:tap_test@localhost:5432/tap_test' }}
          PGPASSWORD: ${{ secrets.TAP_TEST_PG_PASSWORD || 'tap_test' }}
        run: ./scripts/e2e-test.sh

  # ---------------------------------------------------------------------------
  # Stage 7: MySQL integration test (Phase 3)
  # ---------------------------------------------------------------------------
  integration-test-mysql:
    name: MySQL Integration
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: MySQL integration test stub
        run: echo "MySQL integration test — placeholder (Phase 3)"

  # ---------------------------------------------------------------------------
  # Stage 7b: Python SDK build
  # ---------------------------------------------------------------------------
  sdk-py-build:
    name: SDK (Python)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Python SDK
        run: cargo build -p tap-sdk-py

  # ---------------------------------------------------------------------------
  # Stage 7c: Sidecar build
  # ---------------------------------------------------------------------------
  sidecar-build:
    name: Sidecar Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Build and test sidecar
        run: cargo test -p tap-sidecar
